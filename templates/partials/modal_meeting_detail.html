<div class="modal-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
  <div class="modal modal--detail">
    <div class="modal-header">
      <div class="detail-time-badge" id="detailTimeBadge"></div>
      <button class="btn btn--ghost btn--icon btn--sm" id="closeDetail" aria-label="Закрыть">✕</button>
    </div>

    <div class="modal-body">
      <div class="detail-section">
        <span class="detail-label">Дата</span>
        <span class="detail-value" id="detailDate"></span>
      </div>
      <div class="detail-section">
        <span class="detail-label">Сотрудник</span>
        <span class="detail-value detail-value--name" id="detailOrganizer"></span>
      </div>
      <div class="detail-section" id="detailWithSection">
        <span class="detail-label">С кем</span>
        <div class="pills-wrap" id="detailWith"></div>
      </div>
      <div class="detail-section" id="detailCommentSection">
        <span class="detail-label">Комментарий</span>
        <span class="detail-value detail-value--comment" id="detailComment"></span>
      </div>

      <div class="detail-actions">
        <button class="btn btn--outline btn--sm" id="editMeetingBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Редактировать
        </button>
        <button class="btn btn--danger btn--sm" id="deleteMeetingBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Удалить
        </button>
      </div>

      <div class="conflict-alert" id="detailConflictAlert" role="alert">
        <span class="conflict-alert__icon">⚠️</span>
        <span class="conflict-alert__text" id="detailConflictText"></span>
      </div>
    </div>
  </div>
</div>
